<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>zlog monitor</title>
        <style>
            :root {
                --bg-a: #121417;
                --bg-b: #1c2128;
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                width: 100%;
                height: 100%;
                background: radial-gradient(
                        circle at 18% 15%,
                        rgba(108, 192, 255, 0.15),
                        transparent 45%
                    ),
                    radial-gradient(
                        circle at 85% 15%,
                        rgba(255, 204, 120, 0.1),
                        transparent 38%
                    ),
                    linear-gradient(155deg, var(--bg-a), var(--bg-b));
            }

            #app {
                position: relative;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            #viewport {
                position: absolute;
                inset: 0;
            }

        </style>
    </head>
    <body>
        <div id="app">
            <div id="viewport"></div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
                }
            }
        </script>
        <script type="module">
            import * as THREE from "three";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";
            import { STLLoader } from "three/addons/loaders/STLLoader.js";

            const viewport = document.getElementById("viewport");

            const decoder = new TextDecoder();
            const meshLoader = new STLLoader();
            const urlParams = new URLSearchParams(location.search);
            const wsPort = urlParams.get("port") || location.port || "5678";
            const wsHost = urlParams.get("host") || location.hostname;
            const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
            const wsUrl = `${wsProtocol}://${wsHost}:${wsPort}/ws`;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x242424);
            scene.fog = new THREE.Fog(0x242424, 0.1, 100);

            const camera = new THREE.PerspectiveCamera(
                50,
                viewport.clientWidth / viewport.clientHeight,
                0.001,
                100,
            );
            camera.up.set(0, 0, 1);
            camera.position.set(1.5, 1.5, 1.5);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(viewport.clientWidth, viewport.clientHeight);
            viewport.append(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.target.set(0, 0, 0);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(0, 1, 1.5);
            scene.add(directionalLight);

            const grid = new THREE.GridHelper(10, 10, 0x666666, 0x666666);
            grid.rotation.x = Math.PI / 2;
            grid.position.z = -0.001;
            scene.add(grid);
            scene.add(new THREE.AxesHelper(1.5));

            const mainScene = new THREE.Group();
            mainScene.name = "main_scene";
            scene.add(mainScene);

            const objectById = new Map();
            let reconnectTimer = null;

            function numberOr(value, fallback) {
                const number = Number(value);
                return Number.isFinite(number) ? number : fallback;
            }

            function disposeObject(object) {
                object.traverse((obj) => {
                    if (obj.geometry) {
                        obj.geometry.dispose();
                    }
                    if (obj.material) {
                        if (Array.isArray(obj.material)) {
                            obj.material.forEach((mat) => mat.dispose());
                        } else {
                            obj.material.dispose();
                        }
                    }
                });
            }

            function makeMaterial(material = {}) {
                const color = material.color || {};
                const opacity = numberOr(material.opacity, 1);
                const threeColor = new THREE.Color().setRGB(
                    numberOr(color.r, 255) / 255,
                    numberOr(color.g, 255) / 255,
                    numberOr(color.b, 255) / 255,
                    THREE.SRGBColorSpace,
                );
                return new THREE.MeshStandardMaterial({
                    color: threeColor,
                    opacity,
                    transparent: opacity < 1,
                    metalness: numberOr(material.metalness, 0),
                    roughness: numberOr(material.roughness, 0.5),
                });
            }

            function makeArrowGeometry(arrow, material) {
                const length = Math.max(0.001, numberOr(arrow.length, 1));
                const headLength = Math.max(0.001, numberOr(arrow.head_length, 0.2));
                const shaftLength = Math.max(0.001, length - headLength);
                const shaftRadius = Math.max(0.001, numberOr(arrow.shaft_radius, 0.02));
                const headRadius = Math.max(0.001, numberOr(arrow.head_radius, 0.06));
                const group = new THREE.Group();
                const shaft = new THREE.Mesh(
                    new THREE.CylinderGeometry(shaftRadius, shaftRadius, shaftLength, 16),
                    material.clone(),
                );
                shaft.rotation.x = Math.PI / 2;
                shaft.position.z = shaftLength / 2;
                const head = new THREE.Mesh(
                    new THREE.ConeGeometry(headRadius, headLength, 24),
                    material.clone(),
                );
                head.rotation.x = Math.PI / 2;
                head.position.z = shaftLength + headLength / 2;
                group.add(shaft, head);
                material.dispose();
                return group;
            }

            function makeFrameGeometry(frame) {
                return new THREE.AxesHelper(
                    Math.max(0.001, numberOr(frame.axis_length, 1)),
                );
            }

            function isStlPath(path) {
                try {
                    return new URL(path, location.href).pathname.toLowerCase().endsWith(".stl");
                } catch {
                    return false;
                }
            }

            function loadStlMesh(path, material) {
                const group = new THREE.Group();
                meshLoader.load(
                    path,
                    (geometry) => {
                        if (group.userData.disposed) {
                            geometry.dispose();
                            material.dispose();
                            return;
                        }
                        geometry.computeVertexNormals();
                        group.add(new THREE.Mesh(geometry, material));
                        console.log("mesh loaded", path);
                    },
                    undefined,
                    (error) => {
                        material.dispose();
                        console.warn("mesh load failed", path, error);
                    },
                );
                return group;
            }

            function makeObject3D(object) {
                const geometryUnion = object?.geometry;
                const geometryType = Object.keys(geometryUnion || {})[0];
                const geometry = geometryUnion?.[geometryType];
                const material = makeMaterial(object?.material);
                if (!geometryType || !geometry) {
                    material.dispose();
                    return null;
                }

                if (geometryType === "cube") {
                    return new THREE.Mesh(
                        new THREE.BoxGeometry(
                            Math.max(0.001, numberOr(geometry.width, 1)),
                            Math.max(0.001, numberOr(geometry.height, 1)),
                            Math.max(0.001, numberOr(geometry.depth, 1)),
                        ),
                        material,
                    );
                }
                if (geometryType === "sphere") {
                    return new THREE.Mesh(
                        new THREE.SphereGeometry(
                            Math.max(0.001, numberOr(geometry.radius, 0.5)),
                            Math.max(3, Math.trunc(numberOr(geometry.width_segments, 32))),
                            Math.max(2, Math.trunc(numberOr(geometry.height_segments, 16))),
                        ),
                        material,
                    );
                }
                if (geometryType === "cylinder") {
                    const mesh = new THREE.Mesh(
                        new THREE.CylinderGeometry(
                            Math.max(0.001, numberOr(geometry.radius_top, 0.5)),
                            Math.max(0.001, numberOr(geometry.radius_bottom, 0.5)),
                            Math.max(0.001, numberOr(geometry.height, 1)),
                            Math.max(3, Math.trunc(numberOr(geometry.radial_segments, 32))),
                        ),
                        material,
                    );
                    mesh.rotation.x = Math.PI / 2;
                    return mesh;
                }
                if (geometryType === "arrow") {
                    return makeArrowGeometry(geometry, material);
                }
                if (geometryType === "frame") {
                    material.dispose();
                    return makeFrameGeometry(geometry);
                }
                if (geometryType === "mesh") {
                    const path = String(geometry.path ?? "");
                    if (!path || !isStlPath(path)) {
                        material.dispose();
                        console.warn("unsupported mesh path", path);
                        return null;
                    }
                    return loadStlMesh(path, material);
                }

                material.dispose();
                return null;
            }

            function applyPose(target, pose = {}) {
                const position = Array.isArray(pose.position) ? pose.position : [];
                target.position.set(
                    numberOr(position[0], 0),
                    numberOr(position[1], 0),
                    numberOr(position[2], 0),
                );

                const rotation = pose.rotation || {};
                const w = numberOr(rotation.w, 1);
                const x = numberOr(rotation.x, 0);
                const y = numberOr(rotation.y, 0);
                const z = numberOr(rotation.z, 0);
                const norm2 = w * w + x * x + y * y + z * z;
                if (norm2 > 1e-12) {
                    target.quaternion.set(x, y, z, w).normalize();
                } else {
                    target.quaternion.identity();
                }
            }

            function removeObject(id) {
                const object = objectById.get(id);
                if (!object) {
                    return false;
                }
                mainScene.remove(object);
                object.traverse((obj) => {
                    obj.userData.disposed = true;
                });
                disposeObject(object);
                objectById.delete(id);
                return true;
            }

            function applyCommand(command) {
                if (!command || typeof command !== "object") {
                    return "ignored invalid command";
                }

                if (command.remove) {
                    const id = String(command.remove.id ?? "");
                    if (!id) {
                        return "ignored remove without id";
                    }
                    const removed = removeObject(id);
                    return removed ? `removed: ${id}` : `remove missed: ${id}`;
                }

                if (command.add) {
                    const id = String(command.add.id ?? "");
                    if (!id) {
                        return "ignored add without id";
                    }
                    const content = makeObject3D(command.add.object);
                    if (!content) {
                        return `ignored add with unsupported geometry: ${id}`;
                    }
                    removeObject(id);
                    const object = new THREE.Group();
                    object.name = id;
                    object.add(content);
                    applyPose(object, command.add.object?.pose);
                    objectById.set(id, object);
                    mainScene.add(object);
                    return `added: ${id}`;
                }

                if (command.set_pose) {
                    const id = String(command.set_pose.id ?? "");
                    const object = objectById.get(id);
                    if (!id || !object) {
                        return `pose missed: ${id || "(empty id)"}`;
                    }
                    applyPose(object, command.set_pose.pose);
                    return `pose updated: ${id}`;
                }

                return "ignored unknown command";
            }

            function handleBinaryMessage(buffer) {
                const text = decoder.decode(new Uint8Array(buffer));
                try {
                    const command = JSON.parse(text);
                    console.log("ws command", command);
                    console.log(applyCommand(command));
                } catch {
                    console.warn("binary decode failed", text.slice(0, 180));
                }
            }

            function connectWebSocket() {
                if (reconnectTimer !== null) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }

                console.log("ws connecting", wsUrl);
                const ws = new WebSocket(wsUrl);
                ws.binaryType = "arraybuffer";

                ws.addEventListener("open", () => {
                    console.log("ws connected");
                });

                ws.addEventListener("message", async (event) => {
                    if (typeof event.data === "string") {
                        console.log("ws text", event.data.trim());
                        return;
                    }

                    if (event.data instanceof ArrayBuffer) {
                        handleBinaryMessage(event.data);
                        return;
                    }

                    if (event.data && typeof event.data.arrayBuffer === "function") {
                        handleBinaryMessage(await event.data.arrayBuffer());
                    }
                });

                ws.addEventListener("error", (event) => {
                    console.warn("ws error", event);
                });

                ws.addEventListener("close", () => {
                    console.log("ws closed, reconnecting in 1s");
                    reconnectTimer = window.setTimeout(connectWebSocket, 1000);
                });
            }

            function onResize() {
                const width = viewport.clientWidth;
                const height = viewport.clientHeight;
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            }

            function animate() {
                controls.update();
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }

            window.addEventListener("resize", onResize);
            connectWebSocket();
            animate();
        </script>
    </body>
</html>
